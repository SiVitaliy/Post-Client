<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <title>Обновление профиля</title>
    <link rel="stylesheet" href="/css/profile-update.css">
</head>
<body>
<div class="page-wrapper">

    <header class="page-header">
        <div class="page-header__inner">
            <a class="page-header__link" href="/posts">На главную</a>

            <a class="page-header__user" th:href="@{/me}">
                <span th:text="${currentUser.fullName()}"></span>

                <img class="page-header__avatar"
                     th:if="${currentUser.profilePictureUrl() != null}"
                     th:src="${apiBaseUrl + currentUser.profilePictureUrl()}"
                     alt="Profile Picture">

                <img class="page-header__avatar"
                     th:unless="${currentUser.profilePictureUrl() != null}"
                     src="/images/default-profile.png"
                     alt="Default Profile Picture">
            </a>
        </div>
    </header>

    <main class="container">
        <div class="header-container">
            <div class="header__text">
                <h2>Обновление профиля</h2>
            </div>
        </div>

        <form class="profile-form"
              th:action="@{/me/update}"
              th:object="${userToUpdate}"
              method="post"
              enctype="multipart/form-data">

            <div th:if="${error != null}"
                 class="form-error"
                 th:text="${error}">
            </div>

            <div class="avatar-section">
                <label class="field-label">Фото профиля</label>

                <div class="avatar-preview">
                    <img id="profileAvatarPreview"
                         class="profile-avatar"
                         th:src="${currentUser.profilePictureUrl() != null
                            ? apiBaseUrl + currentUser.profilePictureUrl()
                            : '/images/default-profile.png'}"
                         alt="Profile Picture">
                </div>

                <label class="file-upload">
                    <span>Выбрать новое фото</span>
                    <input id="profilePictureInput"
                           type="file"
                           name="profilePicture"
                           accept="image/*">
                </label>

                <small class="field-hint">
                    Оставьте пустым, чтобы сохранить текущее фото
                </small>
            </div>

            <div class="form-grid">
                <div class="form-field">
                    <label class="field-label" for="fullName">Полное имя</label>
                    <input id="fullName"
                           type="text"
                           th:field="*{fullName}"
                           placeholder="Введите имя">

                    <div th:if="${#fields.hasErrors('fullName')}"
                         class="field-error"
                         th:errors="*{fullName}">
                    </div>
                </div>

                <div class="form-field">
                    <label class="field-label" for="email">Email</label>
                    <input id="email"
                           type="email"
                           th:field="*{email}"
                           placeholder="Введите email">

                    <div th:if="${#fields.hasErrors('email')}"
                         class="field-error"
                         th:errors="*{email}">
                    </div>
                </div>

                <div class="form-field">
                    <label class="field-label" for="yearOfBirth">Дата рождения</label>
                    <input id="yearOfBirth"
                           name="yearOfBirth"
                           type="date"
                           th:value="${userToUpdate.yearOfBirth() != null
                ? #temporals.format(userToUpdate.yearOfBirth(), 'yyyy-MM-dd')
                : ''}">

                    <div th:if="${#fields.hasErrors('yearOfBirth')}"
                         class="field-error"
                         th:errors="*{yearOfBirth}">
                    </div>
                </div>

                <div class="form-field">
                    <label class="field-label" for="countryCode">Страна</label>

                    <select id="countryCode"
                            class="select-input"
                            th:field="*{countryCode}">
                        <option value="">Не указана</option>

                        <option th:each="country : ${countries}"
                                th:value="${country.code()}"
                                th:text="${country.name()}">
                        </option>
                    </select>

                    <div th:if="${#fields.hasErrors('countryCode')}"
                         class="field-error"
                         th:errors="*{countryCode}">
                    </div>
                </div>

                <div class="form-field form-field--full">
                    <label class="field-label" for="bio">О себе</label>
                    <textarea id="bio"
                              th:field="*{bio}"
                              rows="5"
                              placeholder="Расскажите немного о себе"></textarea>

                    <div th:if="${#fields.hasErrors('bio')}"
                         class="field-error"
                         th:errors="*{bio}">
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button class="primary-button" type="submit">Сохранить изменения</button>
                <a class="secondary-button" th:href="@{/me}">Отмена</a>
            </div>
        </form>
        <section class="danger-zone">
            <div class="danger-zone__content">
                <div>
                    <h3>Удаление аккаунта</h3>
                    <p>Это действие нельзя отменить. Аккаунт и связанные данные будут удалены.</p>
                </div>

                <form method="post"
                      th:action="@{/me/delete}"
                      onsubmit="return confirm('Вы точно хотите удалить аккаунт? Это действие нельзя отменить.');">
                    <button class="danger-button" type="submit">
                        Удалить аккаунт
                    </button>
                </form>
            </div>
        </section>
    </main>

</div>

<script>
    const profilePictureInput = document.getElementById('profilePictureInput');
    const profileAvatarPreview = document.getElementById('profileAvatarPreview');

    profilePictureInput.addEventListener('change', function () {
        const file = this.files && this.files[0];

        if (!file) {
            return;
        }

        if (!file.type.startsWith('image/')) {
            this.value = '';
            alert('Можно выбрать только изображение');
            return;
        }

        const previewUrl = URL.createObjectURL(file);
        profileAvatarPreview.src = previewUrl;

        profileAvatarPreview.onload = function () {
            URL.revokeObjectURL(previewUrl);
        };
    });
</script>
</body>
</html>
