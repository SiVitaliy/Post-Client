<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <title>My Page</title>
    <link rel="stylesheet" href="/css/profile.css">
</head>
<body>
<div class="page-wrapper">

    <header class="page-header">
        <div class="page-header__inner">
            <a class="page-header__link" href="/posts">На главную</a>

            <a class="page-header__user" th:href="@{/me}">
                <span th:text="${currentUserWithPosts.userDto().fullName()}"></span>

                <img class="page-header__avatar"
                     th:if="${currentUserWithPosts.userDto().profilePictureUrl() != null}"
                     th:src="${'http://localhost:8080/api' + currentUserWithPosts.userDto().profilePictureUrl()}"
                     alt="Profile Picture">

                <img class="page-header__avatar"
                     th:unless="${currentUserWithPosts.userDto().profilePictureUrl() != null}"
                     src="/images/default-profile.png"
                     alt="Default Profile Picture">
            </a>
        </div>
    </header>

    <main class="container">

        <section class="profile-card">
            <div class="profile-avatar-wrapper">
                <img class="profile-avatar"
                     th:if="${currentUserWithPosts.userDto().profilePictureUrl() != null}"
                     th:src="${'http://localhost:8080/api' + currentUserWithPosts.userDto().profilePictureUrl()}"
                     alt="Profile Picture">

                <img class="profile-avatar"
                     th:unless="${currentUserWithPosts.userDto().profilePictureUrl() != null}"
                     src="/images/default-profile.png"
                     alt="Default Profile Picture">
            </div>

            <div class="profile-info">
                <h1 class="profile-name" th:text="${currentUserWithPosts.userDto().fullName()}"></h1>

                <div class="profile-email"
                     th:text="${currentUserWithPosts.userDto().email()}">
                </div>

                <div class="profile-bio"
                     th:if="${currentUserWithPosts.userDto().bio() != null}"
                     th:text="${currentUserWithPosts.userDto().bio()}">
                </div>

                <div class="profile-bio profile-placeholder"
                     th:unless="${currentUserWithPosts.userDto().bio() != null}"
                     aria-hidden="true">
                    hidden bio placeholder
                </div>

                <div class="profile-year"
                     th:if="${currentUserWithPosts.userDto().yearOfBirth() != null}">
                    <span>Дата рождения:</span>
                    <span th:text="${currentUserWithPosts.userDto().yearOfBirth()}"></span>
                </div>

                <div class="profile-year profile-placeholder"
                     th:unless="${currentUserWithPosts.userDto().yearOfBirth() != null}"
                     aria-hidden="true">
                    <span>Дата рождения:</span>
                    <span>2000-01-01</span>
                </div>
            </div>

            <div class="profile-actions">
                <a class="primary-button" href="/me/update">Update</a>
            </div>
        </section>

        <section class="posts-section">
            <div class="section-header">
                <h2>Мои посты</h2>
            </div>

            <div th:if="${!currentUserWithPosts.postContainerDto().getPosts().isEmpty()}"
                 class="records-container">

                <a th:each="post : ${currentUserWithPosts.postContainerDto().getPosts()}"
                   class="record record-link"
                   th:href="@{/posts/{id}(id=${post.id()})}">

                    <div class="record__title" th:text="${post.title()}"></div>

                    <div class="record__date"
                         th:text="${post.creationDate() != null ? #temporals.format(post.creationDate(), 'dd.MM.yyyy HH:mm') : ''}">
                    </div>

                    <div class="record__text"
                         th:text="${post.text()}">
                    </div>

                    <div class="post-images"
                         th:if="${post.postImageContainerDto() != null && !post.postImageContainerDto().getPostImages().isEmpty()}">
                        <div class="post-image-wrapper"
                             th:each="image : ${post.postImageContainerDto().getPostImages()}">
                            <img class="post-image"
                                 th:src="${'http://localhost:8080/api' + image.imageUrl()}"
                                 alt="Post image">
                        </div>
                    </div>
                </a>
            </div>

            <div th:if="${currentUserWithPosts.postContainerDto().getPosts().isEmpty()}"
                 class="hint">
                <p>У вас пока нет постов.</p>
            </div>
        </section>

    </main>

</div>
</body>
</html>
