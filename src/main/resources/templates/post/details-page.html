<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <title th:text="${post.postDto().title()}">Post details page</title>
    <link rel="stylesheet" href="/css/post-details.css">
</head>
<body>
<div class="page-wrapper">

    <header class="page-header">
        <div class="page-header__inner">
            <a class="page-header__link" href="/posts">На главную</a>

            <a class="page-header__user" th:href="@{/me}">
                <span th:text="${currentUser.fullName()}"></span>

                <img class="page-header__avatar"
                     th:if="${currentUser.profilePictureUrl() != null}"
                     th:src="${'http://localhost:8080/api' + currentUser.profilePictureUrl()}"
                     alt="Profile Picture">

                <img class="page-header__avatar"
                     th:unless="${currentUser.profilePictureUrl() != null}"
                     src="/images/default-profile.png"
                     alt="Default Profile Picture">
            </a>
        </div>
    </header>

    <main class="container">

        <section class="post-card">
            <div class="post-header">
                <h1 class="post-title" th:text="${post.postDto().title()}"></h1>

                <div class="post-meta">
                    <span>ID:</span>
                    <span th:text="${post.postDto().id()}"></span>
                </div>
            </div>

            <div class="post-author">
                <span class="post-author__label">Автор:</span>

                <a class="post-author__link"
                   th:if="${post.postDto().author() != null}"
                   th:href="@{/user/{id}(id=${post.postDto().author().id()})}"
                   th:text="${post.postDto().author().fullName()}">
                </a>

                <span class="post-author__deleted"
                      th:unless="${post.postDto().author() != null}">
                    [Удаленный пользователь]
                </span>
            </div>

            <div class="post-text" th:text="${post.postDto().text()}"></div>

            <div class="post-date"
                 th:if="${post.postDto().creationDate() != null}"
                 th:text="${#temporals.format(post.postDto().creationDate(), 'dd.MM.yyyy HH:mm')}">
            </div>

            <div class="post-images"
                 th:if="${post.postDto().postImageContainerDto() != null
                    && !post.postDto().postImageContainerDto().getPostImages().isEmpty()}">
                <div class="post-image-wrapper"
                     th:each="image : ${post.postDto().postImageContainerDto().getPostImages()}">
                    <img class="post-image"
                         th:src="${'http://localhost:8080/api' + image.imageUrl()}"
                         alt="Post image">
                </div>
            </div>

            <div class="post-actions"
                 th:if="${post.postDto().author() != null
                    and currentUser != null
                    and currentUser.id() == post.postDto().author().id()}">

                <a class="secondary-button"
                   th:href="@{/posts/{id}/update(id=${post.postDto().id()})}">
                    Update post
                </a>

                <form th:action="@{/posts/{id}/delete(id=${post.postDto().id()})}"
                      method="post"
                      onsubmit="return confirm('Вы уверены, что хотите удалить этот пост?')">
                    <button class="danger-button" type="submit">Delete post</button>
                </form>
            </div>
        </section>

        <section class="comments-section">
            <div class="section-header">
                <h2>Комментарии</h2>
            </div>

            <form class="comment-form"
                  method="post"
                  th:action="@{/posts/{id}/commentaries(id=${post.postDto().id()})}"
                  th:object="${newCommentary}">

                <textarea class="comment-textarea"
                          name="text"
                          rows="3"
                          placeholder="Оставить комментарий"
                          th:field="*{text}"
                required>
                </textarea>

                <div class="comment-form__actions">
                    <button class="secondary-button" type="reset">Отмена</button>
                    <button class="primary-button" type="submit">Оставить комментарий</button>
                </div>
            </form>

            <div th:with="isCommentsEmpty=${post.commentaryPage() == null or post.commentaryPage().content().isEmpty()}"
                 class="comments-list">

                <div th:if="${isCommentsEmpty}" class="hint">
                    <p>Нет комментариев. Будьте первым!</p>
                </div>

                <article th:if="${!isCommentsEmpty}"
                         th:each="comment : ${post.commentaryPage().content()}"
                         class="comment-card">

                    <div class="comment-author">
                        <div th:if="${comment.author() != null}" class="comment-author__content">
                            <img class="comment-author__avatar"
                                 th:if="${comment.author().profilePictureUrl() != null}"
                                 th:src="${'http://localhost:8080/api' + comment.author().profilePictureUrl()}"
                                 alt="Profile Picture">

                            <img class="comment-author__avatar"
                                 th:unless="${comment.author().profilePictureUrl() != null}"
                                 src="/images/default-profile.png"
                                 alt="Default Profile Picture">

                            <a class="comment-author__name"
                               th:href="@{/user/{id}(id=${comment.author().id()})}"
                               th:text="${comment.author().fullName()}">
                            </a>
                        </div>

                        <span class="comment-author__deleted"
                              th:unless="${comment.author() != null}">
                            [Удалённый пользователь]
                        </span>
                    </div>

                    <div class="comment-text"
                         th:text="${comment.text()}"
                         th:id="'commentText-' + ${comment.id()}">
                    </div>

                    <div class="comment-actions"
                         th:if="${comment.author() != null
                            and currentUser != null
                            and currentUser.id() == comment.author().id()}">

                        <button class="secondary-button secondary-button--small"
                                type="button"
                                th:onclick="'showEditForm(' + ${comment.id()} + ')'">
                            Edit
                        </button>

                        <form th:action="@{/posts/{postId}/commentaries/{id}/delete(postId=${post.postDto().id()}, id=${comment.id()})}"
                              method="post">
                            <button class="danger-button danger-button--small" type="submit">Delete</button>
                        </form>
                    </div>

                    <div class="comment-edit-form"
                         th:id="'editForm-' + ${comment.id()}"
                         style="display:none;">

                        <form th:action="@{/posts/{postId}/commentaries/{id}(postId=${post.postDto().id()}, id=${comment.id()})}"
                              method="post">

                            <textarea class="comment-textarea comment-textarea--edit"
                                      th:id="'editText-' + ${comment.id()}"
                                      name="text"
                                      rows="2"
                                      th:text="${comment.text()}">
                            </textarea>

                            <div class="comment-form__actions">
                                <button class="primary-button primary-button--small" type="submit">Сохранить</button>
                                <button class="secondary-button secondary-button--small"
                                        type="button"
                                        th:onclick="'hideEditForm(' + ${comment.id()} + ')'">
                                    Отмена
                                </button>
                            </div>
                        </form>
                    </div>
                </article>
            </div>

            <nav class="pagination"
                 th:if="${post.commentaryPage() != null and post.commentaryPage().totalPages() > 1}"
                 aria-label="Comments pagination">

                <a class="pagination__item pagination__arrow"
                   th:if="${post.commentaryPage().hasPrevious()}"
                   th:href="@{/posts/{id}(id=${post.postDto().id()}, commentPage=${post.commentaryPage().page() - 1})}">
                    &lt;
                </a>

                <span class="pagination__item pagination__arrow pagination__item--disabled"
                      th:unless="${post.commentaryPage().hasPrevious()}">
                    &lt;
                </span>

                <a th:each="pageNumber : ${#numbers.sequence(0, post.commentaryPage().totalPages() - 1)}"
                   class="pagination__item"
                   th:classappend="${pageNumber == post.commentaryPage().page()} ? ' pagination__item--active'"
                   th:href="@{/posts/{id}(id=${post.postDto().id()}, commentPage=${pageNumber})}"
                   th:text="${pageNumber + 1}">
                </a>

                <a class="pagination__item pagination__arrow"
                   th:if="${post.commentaryPage().hasNext()}"
                   th:href="@{/posts/{id}(id=${post.postDto().id()}, commentPage=${post.commentaryPage().page() + 1})}">
                    &gt;
                </a>

                <span class="pagination__item pagination__arrow pagination__item--disabled"
                      th:unless="${post.commentaryPage().hasNext()}">
                    &gt;
                </span>
            </nav>
        </section>

    </main>
</div>

<script>
    function showEditForm(commentId) {
        document.getElementById('commentText-' + commentId).style.display = 'none';
        document.getElementById('editForm-' + commentId).style.display = 'block';
    }

    function hideEditForm(commentId) {
        document.getElementById('commentText-' + commentId).style.display = 'block';
        document.getElementById('editForm-' + commentId).style.display = 'none';
    }
</script>
</body>
</html>
