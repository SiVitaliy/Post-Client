<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Создать запись</title>
    <style>
        .image-preview {
            margin-top: 10px;
        }
        .image-item {
            display: inline-block;
            margin: 10px;
            position: relative;
        }
        .image-item img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .remove-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>

<br>
<a href="/posts">На главную</a>
<br>

<form method="post" th:action="@{/posts/create}" th:object="${post}" enctype="multipart/form-data" id="postForm">
    <div>
        <label for="title">Заголовок:</label>
        <br>
        <input type="text" id="title" th:field="*{title}" required>
    </div>

    <div>
        <label for="text">Текст:</label>
        <br>
        <textarea id="text" rows="10" th:field="*{text}" required></textarea>
    </div>

    <div>
        <label>Картинки (максимум 5):</label>
        <br>
        <input type="file" id="imageInput" accept="image/*" style="display:none;">
        <button type="button" onclick="document.getElementById('imageInput').click()">Добавить картинку</button>
    </div>

    <div id="imageList" class="image-preview"></div>
    <div th:if="${error != null}" style="color: red" th:text="${error}"></div>

    <div>
        <button type="submit">Создать</button>
    </div>
</form>

<script>
    let images = [];

    document.getElementById('imageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        if (!file.type.startsWith('image/')) {
            alert('Можно загружать только изображения');
            this.value = '';
            return;
        }

        if (file.size > 10 * 1024 * 1024) {
            alert('Файл не должен превышать 10 MB');
            this.value = '';
            return;
        }

        if (images.length >= 5) {
            alert('Можно загрузить не больше 5 картинок');
            this.value = '';
            return;
        }

        images.push(file);

        const reader = new FileReader();
        reader.onload = function(e) {
            const imageList = document.getElementById('imageList');
            const div = document.createElement('div');
            div.className = 'image-item';
            div.innerHTML = `
                <img src="` + e.target.result + `">
                <button type="button" class="remove-btn" onclick="removeImage(` + (images.length - 1) + `)">×</button>
            `;
            imageList.appendChild(div);
        };
        reader.readAsDataURL(file);
        this.value = '';
    });

    function removeImage(index) {
        images.splice(index, 1);
        renderImageList();
    }

    function renderImageList() {
        const imageList = document.getElementById('imageList');
        imageList.innerHTML = '';
        images.forEach((file, idx) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const div = document.createElement('div');
                div.className = 'image-item';
                div.innerHTML = `
                    <img src="` + e.target.result + `">
                    <button type="button" class="remove-btn" onclick="removeImage(` + idx + `)">×</button>
                `;
                imageList.appendChild(div);
            };
            reader.readAsDataURL(file);
        });
    }

    document.getElementById('postForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const formData = new FormData();

        // Достаём значения из th:field (id)
        formData.append('title', document.getElementById('title').value);
        formData.append('text', document.getElementById('text').value);

        images.forEach((file) => {
            formData.append('images', file);
        });

        fetch('/posts/create', {
            method: 'POST',
            body: formData,
            headers: { 'Accept': 'text/html' }
        }).then(response => {
            if (response.redirected) {
                window.location.href = response.url;
            } else {
                return response.text();
            }
        }).then(html => {
            if (html) {
                document.open();
                document.write(html);
                document.close();
            }
        }).catch(error => {
            console.error('Error:', error);
        });
    });
</script>

</body>
</html>
