<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <title>Создать запись</title>
    <link rel="stylesheet" href="/css/create-post.css">
</head>
<body>
<div class="page-wrapper">

    <header class="page-header">
        <div class="page-header__inner">
            <a class="page-header__link" href="/posts">На главную</a>

            <a class="page-header__user" th:href="@{/me}">
                <span th:text="${currentUser.fullName()}"></span>

                <img class="page-header__avatar"
                     th:if="${currentUser.profilePictureUrl() != null}"
                     th:src="${apiBaseUrl + currentUser.profilePictureUrl()}"
                     alt="Profile Picture">

                <img class="page-header__avatar"
                     th:unless="${currentUser.profilePictureUrl() != null}"
                     src="/images/default-profile.png"
                     alt="Default Profile Picture">
            </a>
        </div>
    </header>

    <main class="container">
        <div class="header-container">
            <div class="header__text">
                <h2>Создать запись</h2>
            </div>
        </div>

        <form class="post-form"
              method="post"
              th:action="@{/posts/create}"
              th:object="${post}"
              enctype="multipart/form-data"
              id="postForm">

            <div th:if="${error != null}"
                 class="error-message"
                 th:text="${error}">
            </div>

            <div class="form-field">
                <label class="field-label" for="title">Заголовок</label>
                <input class="text-input"
                       type="text"
                       id="title"
                       th:field="*{title}"
                       placeholder="Введите заголовок">

                <div th:if="${#fields.hasErrors('title')}"
                     class="field-error"
                     th:errors="*{title}">
                </div>
            </div>

            <div class="form-field">
                <label class="field-label" for="text">Текст</label>
                <textarea class="text-area"
                          id="text"
                          rows="10"
                          th:field="*{text}"
                          placeholder="Напишите текст поста"></textarea>

                <div th:if="${#fields.hasErrors('text')}"
                     class="field-error"
                     th:errors="*{text}">
                </div>
            </div>

            <div class="upload-section">
                <div>
                    <div class="field-label">Картинки</div>
                    <div class="field-hint">Можно загрузить максимум 5 изображений, до 10 MB каждое</div>
                </div>

                <input type="file"
                       id="imageInput"
                       accept="image/*"
                       class="hidden-file-input">

                <button class="secondary-button"
                        type="button"
                        onclick="document.getElementById('imageInput').click()">
                    Добавить картинку
                </button>
            </div>

            <div id="imageList" class="image-preview"></div>

            <div class="form-actions">
                <button class="primary-button" type="submit">Создать</button>
                <a class="secondary-button" href="/posts">Отмена</a>
            </div>
        </form>
    </main>

</div>

<script>
    let images = [];

    document.getElementById('imageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];

        if (!file) {
            return;
        }

        if (!file.type.startsWith('image/')) {
            alert('Можно загружать только изображения');
            this.value = '';
            return;
        }

        if (file.size > 10 * 1024 * 1024) {
            alert('Файл не должен превышать 10 MB');
            this.value = '';
            return;
        }

        if (images.length >= 5) {
            alert('Можно загрузить не больше 5 картинок');
            this.value = '';
            return;
        }

        images.push(file);
        renderImageList();
        this.value = '';
    });

    function removeImage(index) {
        images.splice(index, 1);
        renderImageList();
    }

    function renderImageList() {
        const imageList = document.getElementById('imageList');
        imageList.innerHTML = '';

        images.forEach((file, idx) => {
            const previewUrl = URL.createObjectURL(file);

            const div = document.createElement('div');
            div.className = 'image-item';
            div.innerHTML = `
                <img src="${previewUrl}" alt="Selected image">
                <button type="button" class="remove-btn" onclick="removeImage(${idx})">×</button>
            `;

            const img = div.querySelector('img');
            img.onload = function () {
                URL.revokeObjectURL(previewUrl);
            };

            imageList.appendChild(div);
        });
    }

    document.getElementById('postForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const formData = new FormData();

        formData.append('title', document.getElementById('title').value);
        formData.append('text', document.getElementById('text').value);

        images.forEach((file) => {
            formData.append('images', file);
        });

        fetch('/posts/create', {
            method: 'POST',
            body: formData,
            headers: {
                'Accept': 'text/html'
            }
        }).then(response => {
            if (response.redirected) {
                window.location.href = response.url;
            } else {
                return response.text();
            }
        }).then(html => {
            if (html) {
                document.open();
                document.write(html);
                document.close();
            }
        }).catch(error => {
            console.error('Error:', error);
        });
    });
</script>
</body>
</html>
