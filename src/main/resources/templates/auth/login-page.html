<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="/css/login.css" th:href="@{/css/login.css}">
</head>
<body>

<form method="post"
      th:action="@{/auth/process_login}"
      th:object="${user}">

    <label>
        <input type="text"
               th:field="*{email}"
               placeholder="Электронная почта"/>
    </label>

    <div th:if="${#fields.hasErrors('email')}"
         class="field-error"
         th:errors="*{email}">
    </div>

    <br>

    <label>
        <input type="password"
               th:field="*{password}"
               placeholder="Пароль"/>
    </label>

    <div th:if="${#fields.hasErrors('password')}"
         class="field-error"
         th:errors="*{password}">
    </div>

    <br>

    <button type="submit">Login</button>

    <div th:if="${error != null}"
         class="form-error"
         th:text="${error}">
    </div>

    <br>

    <div class="auth-link">
        Нет аккаунта?
        <a href="/auth/registration">Зарегистрироваться</a>
    </div>

</form>
</body>
</html>
